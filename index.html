<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD100">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Keeta Courier">
    <meta name="description" content="Keeta Courier Admin">

    <title>Keeta Courier</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="icons/icon-192x192.png" color="#FFD100">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #FFD100;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFD100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .app-name {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .loading-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #content {
            width: 100%;
            height: 100%;
            border: none;
        }

        .redirect-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFD100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            z-index: 10000;
        }

        .redirect-message.show {
            display: flex;
        }

        .redirect-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .redirect-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .redirect-text {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background: #333;
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
        }

        .btn:active {
            opacity: 0.8;
        }

        .manual-link {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="logo">🛵</div>
        <div class="app-name">Keeta Courier</div>
        <div class="loading-text">正在加载...</div>
        <div class="spinner"></div>
    </div>

    <div class="redirect-message" id="redirect">
        <div class="redirect-icon">🔐</div>
        <div class="redirect-title">需要登录</div>
        <div class="redirect-text">由于安全限制，需要跳转到美团骑手管理页面进行登录</div>
        <a href="https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin" class="btn" id="loginBtn">立即登录</a>
    </div>

    <iframe id="content" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

    <script>
        const TARGET_URL = 'https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin';
        const loading = document.getElementById('loading');
        const redirect = document.getElementById('redirect');
        const iframe = document.getElementById('content');

        // Check if running in standalone PWA mode
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                            window.navigator.standalone === true;

        function showRedirect() {
            loading.classList.add('hidden');
            redirect.classList.add('show');
        }

        function loadApp() {
            // Try to load iframe first
            iframe.src = TARGET_URL;

            // Check if iframe loaded successfully after 3 seconds
            setTimeout(() => {
                try {
                    // If we can't access iframe content due to cross-origin, it might still be blocked
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    // If we can access it and it's empty or has error, show redirect
                    if (!iframeDoc || iframeDoc.body.innerHTML === '') {
                        showRedirect();
                    }
                } catch (e) {
                    // Cross-origin error means it loaded (good)
                    // But we should still check if user sees content
                }
            }, 3000);

            // If loading takes too long (5s), show redirect option
            setTimeout(() => {
                showRedirect();
            }, 5000);

            // Handle iframe load
            iframe.onload = function() {
                setTimeout(() => {
                    loading.classList.add('hidden');
                }, 1000);
            };

            // Handle iframe error
            iframe.onerror = function() {
                showRedirect();
            };
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }

        // Start loading
        loadApp();
    </script>
</body>
</html>
