<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFD100">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Keeta Courier">
    <meta name="description" content="Keeta Courier Admin">
    <meta name="format-detection" content="telephone=no">

    <title>Keeta Courier</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="icons/icon-192x192.png" color="#FFD100">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(255, 209, 0, 0.4);
        }

        .app-name {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 56px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 16px rgba(255, 209, 0, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(255, 209, 0, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:active {
            background: #ebebeb;
        }

        .icon {
            font-size: 20px;
        }

        /* 添加到主屏幕提示 */
        .install-tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 90%;
            width: max-content;
            z-index: 1000;
        }

        .install-tip.show {
            display: flex;
        }

        .install-tip .close {
            margin-left: 8px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
        }

        /* iPhone 底部指示条适配 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .container {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }

        /* 小屏幕适配 */
        @media (max-height: 700px) {
            .logo {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            .app-name {
                font-size: 22px;
            }
            .card {
                padding: 24px 20px;
            }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 209, 0, 0.2);
            border-top-color: #FFD100;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🛵</div>
            <div class="app-name">Keeta Courier</div>
            <div class="app-desc">美团骑手管理后台</div>

            <div class="btn-group">
                <a href="https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin" class="btn btn-primary" id="openBtn">
                    <span class="icon">🚀</span>
                    <span>打开管理后台</span>
                </a>

                <button class="btn btn-secondary" id="installBtn" style="display: none;">
                    <span class="icon">📱</span>
                    <span>添加到主屏幕</span>
                </button>

                <button class="btn btn-secondary" onclick="copyUrl()">
                    <span class="icon">🔗</span>
                    <span>复制链接</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 添加到主屏幕提示 -->
    <div class="install-tip" id="installTip">
        <span>💡 点击"分享"按钮，然后选择"添加到主屏幕"</span>
        <span class="close" onclick="hideInstallTip()">✕</span>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        const TARGET_URL = 'https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin';

        // 检测是否已安装为 PWA
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                            window.navigator.standalone === true;

        // 检测是否为 iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        // 检测是否支持 PWA 安装
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'flex';
        });

        // 安装按钮点击
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    deferredPrompt = null;
                }
            } else if (isIOS) {
                showInstallTip();
            }
        });

        // iOS 显示安装提示
        function showInstallTip() {
            document.getElementById('installTip').classList.add('show');
            setTimeout(hideInstallTip, 8000);
        }

        function hideInstallTip() {
            document.getElementById('installTip').classList.remove('show');
        }

        // 复制链接
        function copyUrl() {
            navigator.clipboard.writeText(TARGET_URL).then(() => {
                const btn = event.target.closest('.btn');
                const original = btn.innerHTML;
                btn.innerHTML = '<span class="icon">✓</span><span>已复制</span>';
                setTimeout(() => {
                    btn.innerHTML = original;
                }, 2000);
            });
        }

        // 打开按钮点击 - 添加加载动画
        document.getElementById('openBtn').addEventListener('click', () => {
            document.getElementById('loading').classList.add('show');
        });

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }

        // 如果是 iOS 且未安装，显示安装提示
        if (isIOS && !isStandalone) {
            setTimeout(showInstallTip, 1500);
        }

        // 隐藏安装按钮如果已安装
        if (isStandalone) {
            document.getElementById('installBtn').style.display = 'none';
        }
    </script>
</body>
</html>
