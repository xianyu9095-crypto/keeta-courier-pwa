<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD100">
    <title>我的骑手 ECODE 映射</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            outline: none;
        }

        .sync-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .sync-status.syncing {
            color: #FFA500;
        }

        .sync-status.synced {
            color: #4CAF50;
        }

        .sync-status.error {
            color: #f44336;
        }

        .sync-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .stats {
            display: flex;
            gap: 15px;
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #FFD100;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .rider-list {
            padding: 15px;
        }

        .rider-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.2s;
        }

        .rider-card:active {
            transform: scale(0.98);
            background: #fafafa;
        }

        .rider-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .rider-info {
            flex: 1;
        }

        .rider-name {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .rider-ecode {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }

        .rider-ecode .label {
            font-size: 12px;
            color: #999;
        }

        .rider-ecode .value {
            font-weight: 600;
            color: #333;
            font-family: monospace;
        }

        .rider-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border: none;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:active {
            background: #e0e0e0;
            transform: scale(0.95);
        }

        .fab {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            color: #333;
            box-shadow: 0 4px 20px rgba(255, 209, 0, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }

        .toast.show {
            display: block;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 209, 0, 0.2);
            border-top-color: #FFD100;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛵 骑手 ECODE 查询</h1>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索骑手名字...">
        </div>
    </div>

    <div class="sync-status syncing" id="syncStatus">
        <span>⏳ 正在同步数据...</span>
        <button class="sync-btn" onclick="syncData()" title="刷新">🔄</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-label">总骑手</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="syncTime">-</div>
            <div class="stat-label">更新时间</div>
        </div>
    </div>

    <div class="rider-list" id="riderList">
        <div class="loading">
            <div class="spinner"></div>
            <p>正在加载数据...</p>
        </div>
    </div>

    <button class="fab" onclick="syncData()" title="刷新数据">🔄</button>

    <div class="toast" id="toast"></div>

    <script>
        // 你的 Google 表格 ID
        const SHEET_ID = '1ygLS9F-lTiWONtHF0JY4SZpj7C7cFm0aLpLbS_iz9DE';
        let riders = [];

        // 页面加载时自动同步
        document.addEventListener('DOMContentLoaded', function() {
            syncData();
        });

        // 同步数据
        async function syncData() {
            updateStatus('syncing', '⏳ 正在同步...');
            document.getElementById('riderList').innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加载数据...</p></div>';

            try {
                // 使用 CSV 导出方式
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

                const response = await fetch(csvUrl);
                const csvText = await response.text();

                // 解析 CSV
                riders = parseCSV(csvText);

                // 保存到本地缓存
                localStorage.setItem('myRiderCache', JSON.stringify(riders));
                localStorage.setItem('myRiderCacheTime', new Date().toISOString());

                renderRiders();
                updateStatus('synced', `✅ 已同步 ${riders.length} 条数据`);
                showToast('数据已更新！');

                // 更新时间显示
                const now = new Date();
                document.getElementById('syncTime').textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

            } catch (error) {
                console.error('同步失败:', error);

                // 尝试使用缓存
                const cached = localStorage.getItem('myRiderCache');
                if (cached) {
                    riders = JSON.parse(cached);
                    renderRiders();
                    updateStatus('error', '⚠️ 离线模式（使用缓存）');
                    showToast('使用离线数据');

                    const cacheTime = localStorage.getItem('myRiderCacheTime');
                    if (cacheTime) {
                        const date = new Date(cacheTime);
                        document.getElementById('syncTime').textContent = date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
                    }
                } else {
                    document.getElementById('riderList').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>同步失败，请检查网络<br>或表格是否已发布</p></div>';
                    updateStatus('error', '❌ 同步失败');
                }
            }
        }

        // 解析 CSV
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = line.split(',');
                if (values.length >= 2) {
                    data.push({
                        id: i,
                        name: values[0].replace(/^"|"$/g, '').trim(),
                        ecode: values[1].replace(/^"|"$/g, '').trim()
                    });
                }
            }

            return data;
        }

        // 渲染骑手列表
        function renderRiders(filter = '') {
            const list = document.getElementById('riderList');

            let displayRiders = riders;
            if (filter) {
                const lowerFilter = filter.toLowerCase();
                displayRiders = riders.filter(r =>
                    r.name.toLowerCase().includes(lowerFilter) ||
                    r.ecode.toLowerCase().includes(lowerFilter)
                );
            }

            displayRiders.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));

            document.getElementById('totalCount').textContent = riders.length;

            if (displayRiders.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>未找到骑手<br>试试其他关键词</p></div>';
            } else {
                list.innerHTML = displayRiders.map(rider => `
                    <div class="rider-card">
                        <div class="rider-avatar">🛵</div>
                        <div class="rider-info">
                            <div class="rider-name">${escapeHtml(rider.name)}</div>
                            <div class="rider-ecode">
                                <span class="label">ECODE</span>
                                <span class="value">${escapeHtml(rider.ecode)}</span>
                            </div>
                        </div>
                        <div class="rider-actions">
                            <button class="btn-icon" onclick="copyEcode('${escapeHtml(rider.ecode)}')" title="复制">📋</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 复制ECODE
        function copyEcode(ecode) {
            navigator.clipboard.writeText(ecode).then(() => {
                showToast('已复制: ' + ecode);
            }).catch(() => {
                // 降级方案
                const input = document.createElement('input');
                input.value = ecode;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('已复制: ' + ecode);
            });
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 更新状态
        function updateStatus(type, text) {
            const status = document.getElementById('syncStatus');
            status.className = 'sync-status ' + type;
            status.querySelector('span').textContent = text;
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderRiders(e.target.value);
        });
    </script>
</body>
</html>
