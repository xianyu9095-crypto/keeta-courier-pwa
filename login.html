<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFD100">
    <title>Keeta Courier - 一键登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(255, 209, 0, 0.4);
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FFD100 0%, #FFA500 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 16px rgba(255, 209, 0, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(255, 209, 0, 0.3);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:active {
            background: #ebebeb;
        }
        .tips {
            margin-top: 24px;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 12px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            text-align: left;
        }
        .tips strong {
            color: #333;
        }
        .icon {
            font-size: 20px;
            margin-right: 8px;
        }
        /* 加载动画 */
        .loading {
            display: none;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 209, 0, 0.2);
            border-top-color: #FFD100;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛵</div>
        <h1>Keeta Courier</h1>
        <div class="subtitle">美团骑手管理后台</div>

        <!-- 主要登录按钮 -->
        <a href="https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin" class="btn btn-primary" id="loginBtn">
            <span class="icon">🚀</span>一键登录
        </a>

        <!-- 仅打开登录页（如果上面不行） -->
        <a href="https://courier.mykeeta.com/partner/web/admin/courier" class="btn btn-secondary">
            打开登录页面
        </a>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #666; font-size: 14px;">正在跳转...</p>
        </div>

        <div class="tips">
            <strong>💡 使用提示：</strong><br>
            1. 点击"一键登录"自动跳转到美团<br>
            2. 如果未登录，输入账号密码即可<br>
            3. 登录后会自动进入<span style="color:#FFD100;font-weight:600">实时监控</span>页面<br>
            4. 建议勾选"记住我"方便下次登录
        </div>
    </div>

    <script>
        // 点击按钮显示加载动画
        document.getElementById('loginBtn').addEventListener('click', function() {
            document.getElementById('loading').classList.add('show');
        });

        // 自动跳转（可选）
        // setTimeout(function() {
        //     window.location.href = 'https://courier.mykeeta.com/partner/web/admin/courier#/schedulerAdmin';
        // }, 1500);
    </script>
</body>
</html>
